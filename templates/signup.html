<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CryptoLens – Create your account">
    <title>CryptoLens – Sign Up</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="auth-page">
        <div class="auth-container fade-in-up">
            <div class="auth-logo">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="CryptoLens">
                <h1>CryptoLens</h1>
                <p>Create Your Account</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-container">
                {% for category, message in messages %}
                <div class="flash-msg {{ category }}">
                    <i
                        class="fas {% if category == 'danger' %}fa-exclamation-circle{% elif category == 'success' %}fa-check-circle{% else %}fa-info-circle{% endif %}"></i>
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <div class="auth-card">
                <h2
                    style="font-size:20px;font-weight:700;color:var(--text-bright);margin-bottom:24px;text-align:center;">
                    <i class="fas fa-user-plus" style="color:var(--accent);margin-right:8px;"></i>Sign Up
                </h2>
                <form method="POST" action="{{ url_for('signup') }}" id="signup-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="form-group">
                        <label for="username"><i class="fas fa-user"></i> Username</label>
                        <input type="text" class="form-control-dark" id="username" name="username"
                            placeholder="Choose a username" required minlength="3" maxlength="50"
                            autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" class="form-control-dark" id="email" name="email"
                            placeholder="Enter your email" required maxlength="120" autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="password"><i class="fas fa-key"></i> Password</label>
                        <input type="password" class="form-control-dark" id="password" name="password"
                            placeholder="Min 6 characters" required minlength="6" maxlength="128"
                            autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="confirm_password"><i class="fas fa-lock"></i> Confirm Password</label>
                        <input type="password" class="form-control-dark" id="confirm_password" name="confirm_password"
                            placeholder="Re-enter your password" required minlength="6" maxlength="128"
                            autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn-primary-custom" id="btn-signup">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
                <div class="auth-link">
                    Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
                </div>
            </div>

            <p style="text-align:center;margin-top:24px;font-size:12px;color:var(--text-muted);">
                CryptoLens v1.0.0 – Developed by AVIK
            </p>
        </div>
    </div>
</body>

</html>
